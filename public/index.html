<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive Drive v6.2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<style>
:root{--bg:#0a0e14;--card:#141b23;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--border:#1e293b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
#login{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0a0e14 0%,#1e293b 100%)}
.login-box{background:var(--card);padding:40px;border-radius:16px;border:1px solid var(--border);width:90%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.login-box h1{margin-bottom:24px;text-align:center;font-size:24px}
.login-box input{width:100%;padding:12px 16px;margin:8px 0;background:#0f172a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px}
.login-box button{width:100%;padding:12px;margin-top:16px;background:var(--accent);border:0;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:15px}
.login-box button:hover{opacity:0.9}
#app{display:flex;height:100vh}
aside{width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:20px;font-weight:700;font-size:18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo i{color:var(--accent)}
.nav{flex:1;padding:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;cursor:pointer;margin:4px 0;color:var(--muted);transition:all 0.2s}
.nav-item:hover,.nav-item.active{background:#0f172a;color:var(--text)}
.nav-item i{width:20px;text-align:center}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.header h2{font-size:18px;font-weight:600}
.tab{display:none;flex:1;overflow:auto;padding:24px}
.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:200px;padding:10px 14px;background:#0f172a;border:1px solid var(--border);border-radius:8px;color:var(--text)}
.btn{padding:10px 16px;background:var(--accent);border:0;border-radius:8px;color:#fff;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:8px}
.btn.secondary{background:#1e293b}
.btn:hover{opacity:0.9}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.file-card{background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;transition:transform 0.2s}
.file-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.file-icon{font-size:32px;margin-bottom:12px;color:var(--accent)}
.file-name{font-weight:500;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:12px;color:var(--muted);display:flex;gap:12px}
.file-menu{position:absolute;top:12px;right:12px;cursor:pointer;padding:4px 8px;border-radius:6px}
.file-menu:hover{background:#1e293b}
.menu{position:absolute;right:0;top:28px;background:var(--card);border:1px solid var(--border);border-radius:8px;min-width:160px;z-index:10;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.menu.show{display:block}
.menu-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px}
.menu-item:hover{background:#0f172a}
.menu-item i{width:16px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty i{font-size:48px;margin-bottom:16px;opacity:0.5}
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:60px 20px;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:#0f172a}
.upload-area i{font-size:48px;color:var(--accent);margin-bottom:16px}
.progress{height:6px;background:#0f172a;border-radius:3px;overflow:hidden;margin-top:16px;display:none}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width 0.3s}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.status-card{background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:18px}
.status-card h3{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:15px}
.status-card .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;margin-top:8px}
.badge.green{background:rgba(34,197,94,0.2);color:#22c55e}
.badge.gray{background:rgba(100,116,139,0.2);color:var(--muted)}
.badge.blue{background:rgba(59,130,246,0.2);color:var(--accent)}
#viewer{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.viewer-content{width:100%;max-width:1200px;max-height:90vh;background:#000;border-radius:12px;overflow:hidden;position:relative}
.viewer-close{position:absolute;top:16px;right:16px;z-index:10;background:rgba(0,0,0,0.7);border:0;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}
.viewer-body{width:100%;height:80vh;display:flex;align-items:center;justify-content:center}
.viewer-body video,.viewer-body img{max-width:100%;max-height:100%}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:8px;z-index:50;justify-content:space-around}
.mobile-nav .nav-item{flex-direction:column;padding:8px;font-size:11px;gap:4px}
@media(max-width:768px){
  aside{display:none}
  .mobile-nav{display:flex}
  main{padding-bottom:70px}
  .file-grid{grid-template-columns:1fr}
  .header{padding:12px 16px}
  .tab{padding:16px}
}
</style>
</head>
<body>
<div id="login">
  <div class="login-box">
    <h1><i class="fa-solid fa-cloud-arrow-up"></i> Archive Drive</h1>
    <input id="user" placeholder="Username" value="admin">
    <input id="pass" type="password" placeholder="Password" value="Admin@2330">
    <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    <p id="loginErr" style="color:#ef4444;margin-top:12px;text-align:center;font-size:13px"></p>
  </div>
</div>

<div id="app">
  <aside>
    <div class="logo"><i class="fa-solid fa-database"></i> Archive Drive</div>
    <div class="nav">
      <div class="nav-item active" onclick="switchTab('drive',this)"><i class="fa-solid fa-folder"></i><span>Drive</span></div>
      <div class="nav-item" onclick="switchTab('upload',this)"><i class="fa-solid fa-upload"></i><span>Upload</span></div>
      <div class="nav-item" onclick="switchTab('status',this)"><i class="fa-solid fa-chart-simple"></i><span>Status</span></div>
    </div>
  </aside>
  <main>
    <div class="header">
      <h2 id="headerTitle">My Drive</h2>
      <button class="btn secondary" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>

    <div id="drive" class="tab active">
      <div class="card">
        <div class="toolbar">
          <input id="identifier" placeholder="Archive.org identifier (e.g. namaycb-remote-...)" />
          <button class="btn" onclick="loadFiles()"><i class="fa-solid fa-rotate"></i> Load</button>
        </div>
        <div id="fileGrid" class="file-grid"></div>
        <div id="emptyDrive" class="empty" style="display:none">
          <i class="fa-solid fa-folder-open"></i>
          <p>No files found. Enter an identifier above.</p>
        </div>
      </div>
    </div>

    <div id="upload" class="tab">
      <div class="card">
        <h3 style="margin-bottom:16px">Upload to Archive.org</h3>
        <input id="uploadId" placeholder="Identifier (leave blank for auto)" style="width:100%;padding:10px 14px;background:#0f172a;border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:16px">
        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <p><strong>Click to browse</strong> or drag files here</p>
          <p style="font-size:13px;color:var(--muted);margin-top:8px">Max 5GB per file</p>
          <input type="file" id="fileInput" hidden multiple onchange="handleFiles(this.files)">
          <div class="progress" id="progWrap"><div class="progress-bar" id="progBar"></div></div>
        </div>
        <div id="uploadList" style="margin-top:20px"></div>
      </div>
    </div>

    <div id="status" class="tab">
      <div class="card">
        <h3 style="margin-bottom:16px"><i class="fa-solid fa-heart-pulse"></i> CDN Status</h3>
        <div id="statusGrid" class="status-grid"></div>
        <div style="margin-top:20px;padding:16px;background:#0f172a;border-radius:8px;font-size:13px;color:var(--muted)">
          <strong>Note:</strong> Oracle Cache is optional. Add ORACLE_CACHE env var to enable.
        </div>
      </div>
    </div>
  </main>

  <div class="mobile-nav">
    <div class="nav-item active" onclick="switchTab('drive',this)"><i class="fa-solid fa-folder"></i><span>Drive</span></div>
    <div class="nav-item" onclick="switchTab('upload',this)"><i class="fa-solid fa-upload"></i><span>Upload</span></div>
    <div class="nav-item" onclick="switchTab('status',this)"><i class="fa-solid fa-chart-simple"></i><span>Status</span></div>
  </div>
</div>

<div id="viewer">
  <div class="viewer-content">
    <button class="viewer-close" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></button>
    <div class="viewer-body" id="viewerBody"></div>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<script>
let token = localStorage.getItem('ad_token');
let currentId = localStorage.getItem('ad_last_id') || '';
let player = null;
let wtClient = null;

if(token) { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='flex'; document.getElementById('identifier').value=currentId; }

async function login(){
  const u=document.getElementById('user').value, p=document.getElementById('pass').value;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.token){ token=d.token; localStorage.setItem('ad_token',token); document.getElementById('login').style.display='none'; document.getElementById('app').style.display='flex'; loadFiles(); }
    else document.getElementById('loginErr').textContent='Invalid login';
  }catch(e){ document.getElementById('loginErr').textContent='Connection error'; }
}
function logout(){ localStorage.removeItem('ad_token'); location.reload(); }
function switchTab(n,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(n).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('headerTitle').textContent = n.charAt(0).toUpperCase()+n.slice(1);
  if(n==='status') loadStatus();
  if(n==='drive' && currentId) loadFiles();
}
async function api(path,opts={}){ opts.headers={...opts.headers,Authorization:'Bearer '+token}; const r=await fetch(path,opts); if(r.status===401){logout();} return r; }

async function loadFiles(){
  const id=document.getElementById('identifier').value.trim();
  if(!id) return;
  currentId=id; localStorage.setItem('ad_last_id',id);
  const grid=document.getElementById('fileGrid'); grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
  try{
    const r=await api(`/api/files/${encodeURIComponent(id)}`);
    const d=await r.json();
    if(!d.files || d.files.length===0){ document.getElementById('emptyDrive').style.display='block'; grid.innerHTML=''; return; }
    document.getElementById('emptyDrive').style.display='none';
    grid.innerHTML = d.files.map(f=>{
      const icon = f.name.match(/\.(mp4|mkv|webm|mov)$/i) ? 'fa-film' : f.name.match(/\.(mp3|wav|flac)$/i) ? 'fa-music' : f.name.match(/\.(jpg|png|gif|webp)$/i) ? 'fa-image' : 'fa-file';
      const size = f.size>1e9?(f.size/1e9).toFixed(2)+' GB':f.size>1e6?(f.size/1e6).toFixed(1)+' MB':(f.size/1e3).toFixed(0)+' KB';
      return `<div class="file-card">
        <div class="file-menu" onclick="toggleMenu(this)"><i class="fa-solid fa-ellipsis"></i>
          <div class="menu">
            <div class="menu-item" onclick="openViewer('${f.url}','${f.name}')"><i class="fa-solid fa-eye"></i>View</div>
            <div class="menu-item" onclick="window.open('${f.directUrl}')"><i class="fa-solid fa-download"></i>Download</div>
            <div class="menu-item" onclick="p2pStream('${id}','${f.name}')"><i class="fa-solid fa-share-nodes"></i>P2P Stream</div>
            <div class="menu-item" onclick="navigator.clipboard.writeText('${f.url}')"><i class="fa-solid fa-copy"></i>Copy Link</div>
          </div>
        </div>
        <div class="file-icon"><i class="fa-solid ${icon}"></i></div>
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-meta"><span>${size}</span><span>${f.format}</span></div>
      </div>`;
    }).join('');
  }catch(e){ grid.innerHTML='<div style="color:#ef4444">Error loading files</div>'; }
}
function toggleMenu(el){ document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show')); el.querySelector('.menu').classList.toggle('show'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.file-menu')) document.querySelectorAll('.menu').forEach(m=>m.classList.remove('show')); });

function openViewer(url,name){
  const body=document.getElementById('viewerBody');
  const ext=name.split('.').pop().toLowerCase();
  if(['mp4','webm','mov','mkv'].includes(ext)){
    body.innerHTML=`<video id="plyr" playsinline controls crossorigin="anonymous"><source src="${url}" type="video/mp4"></video>`;
    player = new Plyr('#plyr',{controls:['play-large','play','progress','current-time','mute','volume','fullscreen']});
  } else if(['mp3','wav','flac','ogg'].includes(ext)){
    body.innerHTML=`<audio id="plyr" controls style="width:90%"><source src="${url}"></audio>`; player=new Plyr('#plyr');
  } else if(['jpg','png','gif','webp','jpeg'].includes(ext)){
    body.innerHTML=`<img src="${url}" alt="${name}">`;
  } else { window.open(url,'_blank'); return; }
  document.getElementById('viewer').style.display='flex';
}
function closeViewer(){ document.getElementById('viewer').style.display='none'; document.getElementById('viewerBody').innerHTML=''; if(player){player.destroy();player=null;} }

function p2pStream(id,name){
  if(!wtClient) wtClient=new WebTorrent();
  alert('P2P streaming will start when peers are available. Opening direct stream for now.');
  openViewer(`https://archive.org/download/${id}/${encodeURIComponent(name)}`,name);
}

async function handleFiles(files){
  const id=document.getElementById('uploadId').value.trim() || '';
  const list=document.getElementById('uploadList'); list.innerHTML='';
  for(const file of files){
    const item=document.createElement('div'); item.style.cssText='padding:12px;background:#0f172a;border-radius:8px;margin:8px 0;display:flex;justify-content:space-between;align-items:center';
    item.innerHTML=`<span><i class="fa-solid fa-file"></i> ${file.name}</span><span id="st-${file.name}">Uploading...</span>`;
    list.appendChild(item);
    const fd=new FormData(); fd.append('file',file); if(id) fd.append('identifier',id);
    try{
      const r=await fetch('/api/upload',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
      const d=await r.json();
      document.getElementById(`st-${file.name}`).innerHTML='<span style="color:#22c55e"><i class="fa-solid fa-check"></i> Done</span>';
      if(d.identifier) document.getElementById('uploadId').value=d.identifier;
    }catch(e){ document.getElementById(`st-${file.name}`).innerHTML='<span style="color:#ef4444">Failed</span>'; }
  }
}
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFiles(e.dataTransfer.files)});

async function loadStatus(){
  const grid=document.getElementById('statusGrid'); grid.innerHTML='<div style="color:var(--muted)">Loading...</div>';
  try{
    const r=await api('/api/status'); const s=await r.json();
    grid.innerHTML=`
      <div class="status-card"><h3><i class="fa-solid fa-cloud-bolt" style="color:#f59e0b"></i> Cloudflare</h3><p>CDN proxy for hot files</p><span class="badge ${s.cloudflare.enabled?'green':'gray'}">${s.cloudflare.enabled?'Active':'Disabled'} • ${s.cloudflare.usage}</span></div>
      <div class="status-card"><h3><i class="fa-solid fa-cube" style="color:#8b5cf6"></i> IPFS</h3><p>Decentralized gateways</p><span class="badge green">Active • ${s.ipfs.usage}</span></div>
      <div class="status-card"><h3><i class="fa-solid fa-server" style="color:#06b6d4"></i> Oracle</h3><p>Free 10TB cache (optional)</p><span class="badge ${s.oracle.enabled?'green':'gray'}">${s.oracle.status}</span></div>
      <div class="status-card"><h3><i class="fa-solid fa-database" style="color:#3b82f6"></i> Archive.org</h3><p>Direct mirrors</p><span class="badge blue">Active • ${s.archive.usage}</span></div>
      <div class="status-card"><h3><i class="fa-solid fa-share-nodes" style="color:#22c55e"></i> WebTorrent</h3><p>P2P peer sharing</p><span class="badge green">Active • Saves ${s.webtorrent.saving}</span></div>
      <div class="status-card"><h3><i class="fa-solid fa-shield-halved" style="color:#eab308"></i> Server</h3><p>Version ${s.server}</p><span class="badge blue">Online</span></div>
    `;
  }catch(e){ grid.innerHTML='<div style="color:#ef4444">Failed to load status</div>'; }
}

// Auto-load
if(token && currentId) setTimeout(loadFiles,500);
</script>
</body>
