<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Archive Drive</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"></head><body>
<div class="bg"></div>
<div id="login" class="login-overlay">
  <div class="login-card">
    <div class="login-head"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7v10c0 1.1.9 2 2 2h12M4 7l8-4 8 4M4 7l8 4 8-4"/></svg><h1>Archive Drive</h1><p>Sign in to continue</p></div>
    <form id="loginForm"><input id="user" placeholder="Username" autocomplete="username" required><input id="pass" type="password" placeholder="Password" autocomplete="current-password" required><button type="submit" class="btn primary">Sign In</button><div id="loginErr" class="login-err"></div></form>
  </div>
</div>
<nav><div class="nav-inner"><div class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 7v10c0 1.1.9 2 2 2h12M4 7l8-4 8 4M4 7l8 4 8-4" stroke="currentColor" stroke-width="1.5"/></svg> Archive Drive</div><div class="nav-right"><div id="status" class="status">●</div><button id="theme" class="icon-btn">◐</button><button id="logout" class="icon-btn">Logout</button></div></div></nav>
<main><section class="hero"><h1>Permanent cloud for <span>archive.org</span></h1></section><div class="grid"><div class="card"><div class="tabs"><button class="tab active" data-tab="files">Files</button><button class="tab" data-tab="url">URL</button></div><div id="files-tab" class="panel active"><div id="drop" class="drop"><input type="file" id="fileInput" multiple hidden><div class="drop-content"><div class="drop-icon">⬆</div><b>Drop files</b><span>up to 5GB</span></div></div><div id="fileList"></div><div class="row"><input id="title" placeholder="identifier"><select id="collection"><option>opensource</option><option>community</option><option>software</option></select></div><input id="desc" placeholder="description"><button id="uploadBtn" class="btn primary" disabled><span>Upload</span></button><div id="progWrap" class="prog-wrap" hidden><div class="prog-bar"><div id="prog"></div></div><span id="progTxt">0%</span></div></div><div id="url-tab" class="panel"><div class="url-row"><input id="urlInput" type="url" placeholder="https://..."><button id="paste" class="btn ghost">Paste</button></div><div class="row"><input id="urlTitle" placeholder="identifier"><input id="urlName" placeholder="filename"></div><button id="urlBtn" class="btn primary"><span>Archive URL</span></button><div id="urlProg" class="prog-wrap" hidden><div class="prog-bar indeterminate"><div></div></div><span>Fetching...</span></div></div><div id="toast"></div></div><div class="card"><div class="head"><h2>Your Items</h2><div class="head-tools"><input id="search" placeholder="Search"><select id="sort"><option value="date-desc">Newest</option><option value="date-asc">Oldest</option><option value="name-asc">A→Z</option><option value="name-desc">Z→A</option></select><button id="refresh" class="icon-btn">↻</button></div></div><div id="items" class="items"></div></div></div></main><script src="app.js"></script></body></html>
