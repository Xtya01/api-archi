<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Archive Drive</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{--bg:#0b0f1a;--sidebar:#111827;--card:#1f2937;--border:#374151;--text:#f9fafb;--muted:#9ca3af;--primary:#6366f1}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.hidden{display:none!important}#login{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b0f1a,#1e1b4b)}
.login-card{background:rgba(31,41,55,.9);backdrop-filter:blur(20px);padding:48px 40px;border-radius:24px;width:100%;max-width:380px;border:1px solid rgba(255,255,.1)}
.login-logo{text-align:center;margin-bottom:32px}.login-logo i{font-size:48px;background:linear-gradient(135deg,var(--primary),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.input-group{position:relative;margin-bottom:16px}.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.input-group input{width:100%;padding:12px 14px 12px 40px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px}
.input-group input:focus{outline:none;border-color:var(--primary)}
.btn-primary{width:100%;padding:12px;background:var(--primary);border:0;border-radius:12px;color:#fff;font-weight:500;cursor:pointer;margin-top:8px;transition:.2s}.btn-primary:hover{background:#5855eb}
#app{height:100vh;display:flex}.sidebar{width:280px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-nav{flex:1;padding:16px}.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;margin-bottom:4px;color:var(--muted);transition:.2s}.nav-item:hover{background:rgba(255,255,.05);color:var(--text)}.nav-item.active{background:var(--primary);color:#fff}.nav-item i{width:20px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;min-width:0}.topbar{height:64px;background:rgba(17,24,39,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.page-title{font-size:20px;font-weight:600;flex:1}.content{flex:1;overflow:auto;padding:24px}
.toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}.search-wrapper{flex:1;position:relative;min-width:200px}.search-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-input{width:100%;padding:11px 14px 11px 40px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px}
.btn{padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:14px;transition:.2s}.btn:hover{background:#374151}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:.3s}.card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.card-icon{width:48px;height:48px;background:rgba(99,102,241,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--primary);margin-bottom:14px}
.upload-zone{border:2px dashed var(--border);border-radius:20px;padding:48px 24px;text-align:center;background:var(--card);cursor:pointer;margin-bottom:24px;transition:.3s}.upload-zone:hover{border-color:var(--primary);background:rgba(99,102,241,.05)}
.url-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);padding:14px 18px;border-radius:12px;transform:translateX(400px);transition:.3s;z-index:100;box-shadow:0 10px 40px rgba(0,0,0,.5)}.toast.show{transform:translateX(0)}
@media(max-width:1024px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:50;transition:.3s}.sidebar.open{transform:translateX(0)}.menu-btn{display:flex!important}}
.menu-btn{display:none;background:0;border:0;color:var(--text);font-size:20px;cursor:pointer;padding:8px}
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-database"></i></div>
    <h1 style="text-align:center;margin-bottom:8px;font-size:24px">Archive Drive</h1>
    <p style="text-align:center;color:var(--muted);margin-bottom:32px;font-size:14px">Sign in to continue</p>
    <div class="input-group"><i class="fas fa-user"></i><input id="user" placeholder="Username" autocomplete="username"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input id="pass" type="password" placeholder="Password" autocomplete="current-password"></div>
    <button class="btn-primary" onclick="login()"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Sign In</button>
  </div>
</div>

<div id="app" class="hidden">
<aside class="sidebar" id="sidebar">
<div style="padding:24px;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center"><i class="fas fa-database"></i></div><div style="font-weight:600;font-size:18px">Archive Drive</div></div></div>
<nav class="sidebar-nav">
<div class="nav-item active" data-page="drive" onclick="nav('drive')"><i class="fas fa-folder-open"></i><span>Drive</span></div>
<div class="nav-item" data-page="my" onclick="nav('my')"><i class="fas fa-cloud"></i><span>My Uploads</span></div>
<div class="nav-item" data-page="upload" onclick="nav('upload')"><i class="fas fa-upload"></i><span>Upload</span></div>
</nav>
</aside>

<div class="main">
<div class="topbar"><button class="menu-btn" onclick="toggleNav()"><i class="fas fa-bars"></i></button><h1 class="page-title" id="title">Drive</h1></div>
<div class="content">
<div id="page-drive"><div class="toolbar"><div class="search-wrapper"><i class="fas fa-search"></i><input class="search-input" id="driveSearch" placeholder="Enter Archive.org identifier..."></div><button class="btn" onclick="loadDrive()"><i class="fas fa-folder-open"></i> Load</button></div><div id="driveGrid"></div></div>
<div id="page-my" class="hidden"><div id="myGrid"></div></div>
<div id="page-upload" class="hidden">
<div class="upload-zone" onclick="fileInput.click()"><i class="fas fa-cloud-arrow-up" style="font-size:48px;color:var(--primary);margin-bottom:16px"></i><h3>Drop files here</h3><p style="color:var(--muted);margin-top:8px">or click to browse • Max 5GB</p></div>
<input type="file" id="fileInput" hidden multiple onchange="uploadFiles(this.files)">
<div class="url-box"><h3 style="margin-bottom:12px"><i class="fas fa-link"></i> Upload from URL</h3><div style="display:flex;gap:12px"><input class="search-input" id="urlInput" placeholder="https://example.com/file.mp4" style="flex:1"><button class="btn" onclick="uploadURL()"><i class="fas fa-download"></i> Download</button></div><input class="search-input" id="urlName" placeholder="Custom filename (optional)" style="margin-top:12px;width:100%"></div>
<div id="uploadList"></div>
</div>
</div></div></div>
<div id="toast" class="toast"></div>

<script>
const API = window.location.origin; let token = localStorage.getItem('token');
const loginDiv = document.getElementById('login'), appDiv = document.getElementById('app');
if(token){loginDiv.classList.add('hidden');appDiv.classList.remove('hidden');}

function nav(p){document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===p));document.querySelectorAll('[id^="page-"]').forEach(x=>x.classList.add('hidden'));document.getElementById('page-'+p).classList.remove('hidden');document.getElementById('title').textContent=p==='my'?'My Uploads':p.charAt(0).toUpperCase()+p.slice(1);if(p==='my')loadMy();}
function toggleNav(){document.getElementById('sidebar').classList.toggle('open');}
async function login(){const r=await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('user').value,password:document.getElementById('pass').value})});const d=await r.json();if(d.token){token=d.token;localStorage.setItem('token',token);location.reload();}else{toast('Invalid credentials');}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function auth(){return{'Authorization':'Bearer '+token};}
function fmt(b){const u=['B','KB','MB','GB'];let i=0;while(b>=1024&&i<3){b/=1024;i++;}return b.toFixed(1)+' '+u[i];}

async function loadDrive(){const id=document.getElementById('driveSearch').value.trim();if(!id)return;const g=document.getElementById('driveGrid');g.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>';try{const r=await fetch(`${API}/api/files/${id}`,{headers:auth()});const d=await r.json();if(!d.files?.length){g.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No files found</div>';return;}g.innerHTML=`<div class="grid">${d.files.map(f=>`<div class="card" onclick="window.open('${f.url}','_blank')"><div class="card-icon"><i class="fas fa-file"></i></div><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${f.name}">${f.name}</div><div style="font-size:12px;color:var(--muted);margin-top:6px">${fmt(f.size)}</div></div>`).join('')}</div>`;}catch(e){g.innerHTML='<div style="color:#ef4444">Error loading</div>';}}

async function loadMy(){const g=document.getElementById('myGrid');g.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>';try{const r=await fetch(`${API}/api/myitems`,{headers:auth()});const d=await r.json();if(!d.items?.length){g.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><i class="fas fa-cloud" style="font-size:48px;margin-bottom:16px;opacity:.5"></i><div>No uploads yet</div></div>';return;}g.innerHTML=`<div class="grid">${d.items.map(i=>`<div class="card" onclick="document.getElementById('driveSearch').value='${i.identifier}';nav('drive');loadDrive()"><div class="card-icon"><i class="fas fa-${i.source==='instant'?'bolt':'folder'}" style="color:${i.source==='instant'?'#10b981':'var(--primary)'}"></i></div><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${i.title}">${i.title}</div><div style="font-size:12px;color:var(--muted);margin-top:6px">${i.source==='instant'?'<span style="color:#10b981">Just uploaded • </span>':''}${new Date(i.date).toLocaleDateString()}</div></div>`).join('')}</div>`;}catch(e){g.innerHTML='<div style="color:#ef4444">Error</div>';}}

async function uploadFiles(files){const list=document.getElementById('uploadList');for(const f of files){const item=document.createElement('div');item.className='card';item.style.marginBottom='12px';item.innerHTML=`<div style="display:flex;align-items:center;gap:12px"><div class="card-icon" style="margin:0"><i class="fas fa-spinner fa-spin"></i></div><div style="flex:1"><div style="font-weight:500">${f.name}</div><div style="font-size:12px;color:var(--muted)">${fmt(f.size)} • Uploading...</div></div></div>`;list.prepend(item);const fd=new FormData();fd.append('file',f);try{const r=await fetch(`${API}/api/upload`,{method:'POST',headers:auth(),body:fd});const d=await r.json();if(d.success){item.innerHTML=`<div style="display:flex;align-items:center;gap:12px"><div class="card-icon" style="margin:0;background:rgba(16,185,129,.1);color:#10b981"><i class="fas fa-check"></i></div><div style="flex:1"><div style="font-weight:500">${f.name}</div><div style="font-size:12px;color:#10b981">Uploaded • Instantly available</div></div></div>`;toast('Upload complete!');loadMy();}else{throw new Error();}}catch(e){item.innerHTML=`<div style="color:#ef4444">Failed: ${f.name}</div>`;}}}

async function uploadURL(){const url=document.getElementById('urlInput').value.trim();if(!url){toast('Enter URL');return;}const btn=event.target;const orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Downloading...';try{const r=await fetch(`${API}/api/upload-url`,{method:'POST',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify({url,filename:document.getElementById('urlName').value})});const d=await r.json();if(d.success){toast('URL uploaded!');document.getElementById('urlInput').value='';document.getElementById('urlName').value='';loadMy();nav('my');}else{throw new Error();}}catch(e){toast('Download failed');}finally{btn.disabled=false;btn.innerHTML=orig;}}

// Enter key login
document.getElementById('pass')?.addEventListener('keypress',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
