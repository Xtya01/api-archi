<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive Drive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #0b0f1a;
  --sidebar: #111827;
  --card: #1f2937;
  --card-hover: #273244;
  --text: #e5e7eb;
  --text-muted: #9ca3af;
  --accent: #6366f1;
  --green: #10b981;
  --border: #2d3748;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
.hidden { display: none !important; }

/* Login */
#login {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: radial-gradient(circle at 30% 20%, #1e293b 0%, #0b0f1a 60%);
}
.login-card {
  width: 360px;
  padding: 40px;
  background: rgba(17, 24, 39, 0.7);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
.login-card h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
.input {
  width: 100%;
  padding: 12px 14px;
  background: #0f172a;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
  transition: border 0.2s;
}
.input:focus { border-color: var(--accent); }
.btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.98); }

/* App Layout */
#app { display: flex; height: 100vh; }
.sidebar {
  width: 260px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 14px;
  transition: transform 0.3s;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 24px;
}
.logo i { color: var(--accent); }
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  transition: all 0.2s;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--card); color: white; }
.nav-item i { width: 18px; text-align: center; }
.sidebar-footer {
  margin-top: auto;
  padding: 12px;
  font-size: 12px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; }
.page-title { font-size: 18px; font-weight: 600; }
.spacer { flex: 1; }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
.card-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.card-meta { font-size: 12px; color: var(--text-muted); }
.badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(16,185,129,0.15);
  color: var(--green);
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 600;
}

/* Drive */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  max-width: 600px;
}
.search-bar input { flex: 1; }
.search-bar button { width: auto; padding: 0 20px; }

.file-list { margin-top: 20px; }
.file-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  transition: background 0.2s;
}
.file-item:hover { background: var(--card-hover); }
.file-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 8px; color: var(--accent); }
.file-info { flex: 1; }
.file-name { font-size: 14px; font-weight: 500; }
.file-size { font-size: 12px; color: var(--text-muted); }
.file-actions a { color: var(--text-muted); padding: 6px; }
.file-actions a:hover { color: white; }

/* Upload */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 60px 20px;
  text-align: center;
  background: rgba(31,41,55,0.3);
  transition: all 0.2s;
  cursor: pointer;
  margin-bottom: 24px;
}
.upload-zone.dragover { border-color: var(--accent); background: rgba(99,102,241,0.1); }
.upload-zone i { font-size: 32px; color: var(--text-muted); margin-bottom: 12px; }
.upload-zone h3 { font-size: 16px; margin-bottom: 6px; }
.upload-zone p { font-size: 13px; color: var(--text-muted); }

.upload-form {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  max-width: 600px;
}
.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); }
.progress {
  height: 4px;
  background: #0f172a;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 12px;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 12px 16px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  z-index: 1000;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast.success i { color: var(--green); }
.toast.error i { color: #ef4444; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: block; }
  .content { padding: 16px; }
  .grid { grid-template-columns: 1fr; }
}
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty i { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <h1><i class="fa-solid fa-box-archive"></i> Archive Drive</h1>
    <p>Sign in to access your Internet Archive</p>
    <input id="username" class="input" placeholder="Username" autocomplete="username">
    <input id="password" class="input" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Continue</button>
  </div>
</div>

<div id="app" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="logo"><i class="fa-solid fa-box-archive"></i> Archive Drive</div>
    <div class="nav-item active" data-page="drive"><i class="fa-regular fa-folder-open"></i> Drive</div>
    <div class="nav-item" data-page="uploads"><i class="fa-solid fa-cloud"></i> My Uploads</div>
    <div class="nav-item" data-page="upload"><i class="fa-solid fa-arrow-up-from-bracket"></i> Upload</div>
    <div class="sidebar-footer">
      <div>Connected to archive.org</div>
      <div style="margin-top:6px;cursor:pointer" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign out</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="page-title" id="pageTitle">Drive</div>
      <div class="spacer"></div>
    </div>

    <div class="content">
      <!-- Drive Page -->
      <div id="page-drive" class="page">
        <div class="search-bar">
          <input id="driveId" class="input" placeholder="Enter Archive.org identifier (e.g. nasa)" style="margin:0">
          <button class="btn" onclick="browseDrive()">Browse</button>
        </div>
        <div id="driveResults"></div>
        <div id="driveEmpty" class="empty">
          <i class="fa-regular fa-folder-open"></i>
          <p>Enter an identifier to browse public Archive.org items</p>
        </div>
      </div>

      <!-- My Uploads -->
      <div id="page-uploads" class="page hidden">
        <div id="uploadsGrid" class="grid"></div>
        <div id="uploadsEmpty" class="empty hidden">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <p>No uploads yet. Upload your first file.</p>
        </div>
      </div>

      <!-- Upload -->
      <div id="page-upload" class="page hidden">
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <h3>Drag & drop files here</h3>
          <p>or click to browse • Max 5GB</p>
          <input type="file" id="fileInput" hidden>
        </div>

        <div class="upload-form">
          <div class="form-row">
            <label>File upload</label>
            <input id="uploadTitle" class="input" placeholder="Title (optional)" style="margin:0 0 8px">
            <input id="uploadId" class="input" placeholder="Custom identifier (optional)" style="margin:0">
          </div>
          <button class="btn" id="uploadBtn" onclick="startUpload()">Upload to Archive.org</button>
          <div class="progress hidden" id="uploadProgress"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div class="upload-form" style="margin-top:20px">
          <div class="form-row">
            <label>Upload from URL</label>
            <input id="urlInput" class="input" placeholder="https://example.com/file.pdf" style="margin:0 0 8px">
            <input id="urlFilename" class="input" placeholder="Filename (optional)" style="margin:0">
          </div>
          <button class="btn" onclick="uploadFromUrl()">Fetch & Upload</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const API = '';
let token = localStorage.getItem('ad_token');
let currentFile = null;

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fa-solid fa-${type==='success'?'circle-check':'triangle-exclamation'}"></i> ${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function apiFetch(url, opts={}) {
  opts.headers = opts.headers || {};
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  return fetch(API + url, opts);
}

async function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:u, password:p}) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    token = d.token;
    localStorage.setItem('ad_token', token);
    initApp();
  } catch(e) { showToast(e.message, 'error'); }
}

function logout() {
  localStorage.removeItem('ad_token');
  location.reload();
}

function initApp() {
  if (!token) return;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadUploads();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    const page = el.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById('page-' + page).classList.remove('hidden');
    document.getElementById('pageTitle').textContent = el.textContent.trim();
    document.getElementById('sidebar').classList.remove('open');
    if (page === 'uploads') loadUploads();
  };
});

function formatSize(b) {
  if (!b) return '-';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0;
  b = Number(b);
  while (b >= 1024 && i < u.length-1) { b /= 1024; i++; }
  return b.toFixed(1) + ' ' + u[i];
}

async function loadUploads() {
  const grid = document.getElementById('uploadsGrid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
  try {
    const r = await apiFetch('/api/myitems');
    const d = await r.json();
    if (!d.items?.length) {
      document.getElementById('uploadsEmpty').classList.remove('hidden');
      grid.innerHTML = '';
      return;
    }
    document.getElementById('uploadsEmpty').classList.add('hidden');
    grid.innerHTML = d.items.map(it => `
      <div class="card" onclick="openItem('${it.identifier}')">
        ${it.instant ? '<div class="badge"><i class="fa-solid fa-bolt"></i> Just uploaded</div>' : ''}
        <div class="card-title"><i class="fa-regular fa-folder"></i> ${it.title || it.identifier}</div>
        <div class="card-meta">${it.identifier} • ${new Date(it.date).toLocaleDateString()}${it.size ? ' • ' + formatSize(it.size) : ''}</div>
      </div>
    `).join('');
  } catch(e) {
    grid.innerHTML = `<div style="color:#ef4444">Failed to load: ${e.message}</div>`;
  }
}

async function browseDrive() {
  const id = document.getElementById('driveId').value.trim();
  if (!id) return;
  const out = document.getElementById('driveResults');
  document.getElementById('driveEmpty').classList.add('hidden');
  out.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)"><i class="fa-solid fa-spinner fa-spin"></i> Loading files...</div>';
  try {
    const r = await apiFetch('/api/files/' + encodeURIComponent(id));
    const d = await r.json();
    if (!d.files?.length) {
      out.innerHTML = '<div class="empty"><i class="fa-regular fa-file"></i><p>No files found</p></div>';
      return;
    }
    out.innerHTML = `<div class="file-list">${d.files.map(f => `
      <div class="file-item">
        <div class="file-icon"><i class="fa-regular fa-file"></i></div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-size">${formatSize(f.size)}</div>
        </div>
        <div class="file-actions">
          <a href="${f.url}" target="_blank" title="Download"><i class="fa-solid fa-download"></i></a>
        </div>
      </div>
    `).join('')}</div>`;
  } catch(e) {
    out.innerHTML = `<div style="color:#ef4444">Error: ${e.message}</div>`;
  }
}

function openItem(id) {
  document.querySelector('[data-page="drive"]').click();
  document.getElementById('driveId').value = id;
  browseDrive();
}

// Upload handling
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragover'); }));
dropZone.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) { currentFile = f; fileInput.files = e.dataTransfer.files; updateDropZone(); }
});
fileInput.addEventListener('change', e => { currentFile = e.target.files[0]; updateDropZone(); });

function updateDropZone() {
  if (currentFile) {
    dropZone.innerHTML = `<i class="fa-solid fa-file" style="color:var(--accent)"></i><h3>${currentFile.name}</h3><p>${formatSize(currentFile.size)} • Ready to upload</p>`;
  }
}

async function startUpload() {
  if (!currentFile) return showToast('Select a file first', 'error');
  const btn = document.getElementById('uploadBtn');
  const prog = document.getElementById('uploadProgress');
  const bar = document.getElementById('progressBar');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
  prog.classList.remove('hidden'); bar.style.width = '30%';

  const fd = new FormData();
  fd.append('file', currentFile);
  fd.append('title', document.getElementById('uploadTitle').value);
  fd.append('identifier', document.getElementById('uploadId').value);

  try {
    const r = await apiFetch('/api/upload', { method: 'POST', body: fd });
    bar.style.width = '100%';
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Upload failed');
    showToast('Uploaded successfully!');
    currentFile = null; fileInput.value = '';
    dropZone.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i><h3>Drag & drop files here</h3><p>or click to browse • Max 5GB</p>`;
    document.querySelector('[data-page="uploads"]').click();
    setTimeout(loadUploads, 500);
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Upload to Archive.org';
    setTimeout(() => { prog.classList.add('hidden'); bar.style.width = '0%'; }, 1000);
  }
}

async function uploadFromUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return showToast('Enter URL', 'error');
  const btn = event.target;
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Fetching...';
  try {
    const r = await apiFetch('/api/upload-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, filename: document.getElementById('urlFilename').value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    showToast('URL uploaded!');
    document.getElementById('urlInput').value = '';
    document.querySelector('[data-page="uploads"]').click();
    loadUploads();
  } catch(e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Fetch & Upload'; }
}

// Init
if (token) initApp();
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
