<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Archive Drive v6.2</title>
<style>
:root{--bg:#0a0e14;--card:#141b23;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--primary:#3b82f6;--success:#10b981;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.hidden{display:none!important}

/* Login */
#login{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1e293b 0%,#0a0e14 100%)}
.login-box{background:var(--card);padding:40px;border-radius:16px;width:100%;max-width:360px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-box h1{font-size:24px;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:24px}
input{width:100%;padding:12px 14px;background:#0f172a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px;transition:border .2s}
input:focus{outline:none;border-color:var(--primary)}
button{width:100%;padding:12px;background:var(--primary);border:0;border-radius:8px;color:#fff;font-weight:500;cursor:pointer;transition:opacity .2s;font-size:14px}
button:hover{opacity:.9}
button:disabled{opacity:.5;cursor:not-allowed}
.error{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}

/* App */
#app{height:100vh;display:flex;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:8px}
.logo{font-weight:600;font-size:18px;margin-right:24px;display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted);transition:all .2s;user-select:none}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-tab.active{background:var(--primary);color:#fff}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:13px;color:var(--muted)}

/* Main */
main{flex:1;overflow:auto;padding:24px;max-width:1400px;width:100%;margin:0 auto}
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-box{flex:1;min-width:300px;position:relative}
.search-box input{padding-left:40px;margin:0}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.view-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:2px}
.view-btn{padding:8px 12px;background:transparent;border:0;color:var(--muted);cursor:pointer;border-radius:6px;font-size:13px}
.view-btn.active{background:var(--primary);color:#fff}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.list{display:flex;flex-direction:column;gap:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-icon{width:48px;height:48px;background:#0f172a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px}
.card-title{font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:var(--muted);display:flex;gap:12px}
.card-actions{position:absolute;top:12px;right:12px;opacity:0;transition:opacity .2s}
.card:hover .card-actions{opacity:1}
.action-btn{width:28px;height:28px;background:#0f172a;border:1px solid var(--border);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;margin-left:4px;font-size:14px}
.action-btn:hover{background:var(--primary);border-color:var(--primary)}

/* List view */
.list-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s}
.list-item:hover{border-color:var(--primary);background:rgba(59,130,246,.05)}
.list-icon{font-size:20px;width:32px;text-align:center}
.list-info{flex:1;min-width:0}
.list-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-meta{font-size:12px;color:var(--muted);margin-top:2px}

/* Upload */
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:60px 20px;text-align:center;background:var(--card);cursor:pointer;transition:all .2s;margin-bottom:24px}
.upload-area:hover,.upload-area.dragover{border-color:var(--primary);background:rgba(59,130,246,.05)}
.upload-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.upload-text{font-size:16px;margin-bottom:8px}
.upload-hint{font-size:13px;color:var(--muted)}
.progress-bar{height:4px;background:#0f172a;border-radius:2px;overflow:hidden;margin-top:16px;display:none}
.progress-fill{height:100%;background:var(--primary);width:0%;transition:width .3s}

/* Empty state */
.empty{padding:80px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.3}
.empty-title{font-size:18px;margin-bottom:8px;color:var(--text)}
.empty-text{font-size:14px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(100px);opacity:0;transition:all .3s;z-index:1000;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <h1>Archive Drive</h1>
    <p>Private cloud storage v6.2</p>
    <input id="user" type="text" placeholder="Username" value="admin" autocomplete="username">
    <input id="pass" type="password" placeholder="Password" value="Admin@2330" autocomplete="current-password">
    <button id="loginBtn" onclick="login()">Sign In</button>
    <div id="loginErr" class="error"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <header>
    <div class="logo"><div class="logo-icon">A</div>Archive Drive</div>
    <div class="nav-tab active" data-tab="drive" onclick="switchTab('drive')">Drive</div>
    <div class="nav-tab" data-tab="my" onclick="switchTab('my')">My Uploads</div>
    <div class="nav-tab" data-tab="upload" onclick="switchTab('upload')">Upload</div>
    <div class="header-right">
      <span id="status">Ready</span>
      <span style="cursor:pointer" onclick="logout()">Logout</span>
    </div>
  </header>

  <main>
    <!-- Drive Tab -->
    <div id="tab-drive">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input id="searchInput" placeholder="Enter identifier or search..." onkeypress="if(event.key==='Enter')searchDrive()">
        </div>
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('grid')">⊞ Grid</button>
          <button class="view-btn" onclick="setView('list')">☰ List</button>
        </div>
      </div>
      <div id="driveContent"><div class="empty"><div class="empty-icon">📁</div><div class="empty-title">No files loaded</div><div class="empty-text">Enter an identifier above or go to My Uploads</div></div></div>
    </div>

    <!-- My Uploads Tab -->
    <div id="tab-my" class="hidden">
      <div class="toolbar">
        <h2 style="flex:1">Your Archive.org Items</h2>
        <button onclick="loadMyItems()" style="width:auto;padding:8px 16px">↻ Refresh</button>
      </div>
      <div id="myContent"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- Upload Tab -->
    <div id="tab-upload" class="hidden">
      <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">⬆</div>
        <div class="upload-text">Drop files here or click to browse</div>
        <div class="upload-hint">Max 5GB per file • Stored on Archive.org</div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
      <div style="display:flex;gap:12px;margin-bottom:20px">
        <input id="customId" placeholder="Custom identifier (optional)" style="flex:1;margin:0">
        <button onclick="document.getElementById('fileInput').click()" style="width:auto;padding:12px 24px">Select Files</button>
      </div>
      <div id="uploadQueue"></div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('ad_token');
let currentView = 'grid';
let myItemsCache = null;

// Init
if (token) { document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); loadMyItems(); }
document.getElementById('pass').addEventListener('keypress', e => e.key === 'Enter' && login());

async function login() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: user.value, password: pass.value})
    });
    const data = await res.json();
    if (data.token) {
      token = data.token; localStorage.setItem('ad_token', token);
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadMyItems(); showToast('Welcome back!', 'success');
    } else throw new Error(data.error);
  } catch (e) {
    document.getElementById('loginErr').textContent = e.message;
  } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
}

function logout() { localStorage.removeItem('ad_token'); location.reload(); }
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('[id^="tab-"]').forEach(p => p.classList.add('hidden'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  if (tab === 'my' && !myItemsCache) loadMyItems();
}
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(view === 'grid' ? 'Grid' : 'List')));
  const container = document.getElementById('driveContent');
  if (container.dataset.files) renderFiles(JSON.parse(container.dataset.files));
}
function showToast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; setTimeout(()=>t.classList.remove('show'),3000); }
function apiHeaders() { return { 'Authorization': `Bearer ${token}` }; }
function formatSize(b){ if(!b)return'0 B'; const u=['B','KB','MB','GB']; let i=0; while(b>=1024&&i<u.length-1){b/=1024;i++} return b.toFixed(1)+' '+u[i]; }
function getIcon(name){ const e=name.split('.').pop().toLowerCase(); if(['mp4','mkv','avi','mov'].includes(e))return'🎬'; if(['mp3','wav','flac'].includes(e))return'🎵'; if(['jpg','jpeg','png','gif','webp'].includes(e))return'🖼'; if(['pdf'].includes(e))return'📄'; if(['zip','rar','7z'].includes(e))return'📦'; return'📄'; }

async function searchDrive() {
  const id = document.getElementById('searchInput').value.trim();
  if (!id) return;
  const content = document.getElementById('driveContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API}/api/files/${encodeURIComponent(id)}`, { headers: apiHeaders() });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    content.dataset.files = JSON.stringify(data.files);
    renderFiles(data.files, data.title);
    document.getElementById('status').textContent = `${data.files.length} files`;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">Error</div><div class="empty-text">${e.message}</div></div>`;
  }
}

function renderFiles(files, title='') {
  const container = document.getElementById('driveContent');
  if (!files.length) { container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">No files</div></div>'; return; }
  
  if (currentView === 'grid') {
    container.innerHTML = `<div class="grid">${files.map(f=>`
      <div class="card" onclick="window.open('${f.url}','_blank')">
        <div class="card-icon">${getIcon(f.name)}</div>
        <div class="card-title" title="${f.name}">${f.name}</div>
        <div class="card-meta"><span>${formatSize(f.size)}</span><span>${f.format||''}</span></div>
        <div class="card-actions"><div class="action-btn" onclick="event.stopPropagation();navigator.clipboard.writeText('${f.url}');showToast('Link copied')">⧉</div></div>
      </div>`).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="list">${files.map(f=>`
      <div class="list-item" onclick="window.open('${f.url}','_blank')">
        <div class="list-icon">${getIcon(f.name)}</div>
        <div class="list-info"><div class="list-title">${f.name}</div><div class="list-meta">${formatSize(f.size)} • ${f.format||'file'}</div></div>
      </div>`).join('')}</div>`;
  }
}

async function loadMyItems() {
  const container = document.getElementById('myContent');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API}/api/myitems`, { headers: apiHeaders() });
    const data = await res.json();
    myItemsCache = data.items;
    if (!data.items.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📤</div><div class="empty-title">No uploads yet</div><div class="empty-text">Go to Upload tab to add your first file</div></div>'; return;
    }
    container.innerHTML = `<div class="grid">${data.items.map(item=>`
      <div class="card" onclick="document.getElementById('searchInput').value='${item.identifier}';switchTab('drive');searchDrive()">
        <div class="card-icon">📁</div>
        <div class="card-title" title="${item.title}">${item.title}</div>
        <div class="card-meta"><span>${new Date(item.date).toLocaleDateString()}</span><span>${formatSize(item.size)}</span></div>
      </div>`).join('')}</div>`;
    document.getElementById('status').textContent = `${data.total} items`;
  } catch (e) {
    container.innerHTML = `<div class="empty"><div class="empty-title">Failed to load</div><div class="empty-text">${e.message}</div></div>`;
  }
}

// Upload handling
const dropZone = document.getElementById('dropZone');
['dragenter','dragover'].forEach(e=>dropZone.addEventListener(e,ev=>{ev.preventDefault();dropZone.classList.add('dragover')}));
['dragleave','drop'].forEach(e=>dropZone.addEventListener(e,ev=>{ev.preventDefault();dropZone.classList.remove('dragover')}));
dropZone.addEventListener('drop',ev=>handleFiles(ev.dataTransfer.files));

async function handleFiles(files) {
  for (const file of files) await uploadFile(file);
}
async function uploadFile(file) {
  const id = document.getElementById('customId').value.trim();
  const queue = document.getElementById('uploadQueue');
  const item = document.createElement('div'); item.className='list-item'; item.style.marginBottom='8px';
  item.innerHTML = `<div class="list-icon">⬆</div><div class="list-info"><div class="list-title">${file.name}</div><div class="list-meta">Uploading...</div></div>`;
  queue.prepend(item);
  
  const form = new FormData(); form.append('file', file); if(id) form.append('identifier', id);
  try {
    const res = await fetch(`${API}/api/upload`, { method:'POST', headers: apiHeaders(), body: form });
    const data = await res.json();
    if (data.success) {
      item.querySelector('.list-meta').textContent = `Uploaded to ${data.identifier}`;
      item.querySelector('.list-icon').textContent = '✓';
      showToast(`Uploaded ${file.name}`, 'success'); myItemsCache = null;
    } else throw new Error(data.error);
  } catch (e) {
    item.querySelector('.list-meta').textContent = 'Failed: '+e.message; item.querySelector('.list-icon').textContent = '✗';
    showToast('Upload failed', 'error');
  }
}
</script>
</body>
</html>
