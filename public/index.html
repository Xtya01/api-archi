<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive Drive v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;background:#0a0a0a;color:#e5e5e5;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}.card{background:#111;border:1px solid #222;border-radius:16px;padding:24px;margin-bottom:20px}
h1{font-size:24px;margin-bottom:20px;text-align:center}h2{font-size:16px;margin-bottom:12px;color:#aaa}
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid #222}.tab{padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;color:#888}.tab.active{color:#fff;border-color:#0066cc}
.tab-content{display:none}.tab-content.active{display:block}
input,button,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #2a2a2a;background:#1a1a1a;color:#fff;font-size:14px}
button{background:#0066cc;border:none;font-weight:600;cursor:pointer}button:hover{background:#0052a3}button:disabled{opacity:.5}
button.small{width:auto;padding:6px 12px;font-size:12px;margin:0}
.progress{height:6px;background:#222;border-radius:3px;overflow:hidden;margin:10px 0;display:none}.progress-bar{height:100%;background:#0066cc;width:0%;transition:width.2s}
.result{margin-top:12px;padding:12px;border-radius:8px;font-size:13px;display:none}.result.show{display:block}.ok{background:#0f1f0f;color:#9f9}.err{background:#1f0f0f;color:#f99}
.file-list{max-height:400px;overflow-y:auto}.item{padding:12px;border:1px solid #222;border-radius:8px;margin:6px 0;background:#0f0f0f;cursor:pointer}.item:hover{background:#1a1a1a}
.item-title{font-weight:600}.item-meta{font-size:12px;color:#888;margin-top:4px}
.file{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222}.file:last-child{border:none}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px;font-size:13px}
.hidden{display:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="card" id="loginCard">
<h1>📦 Archive Drive v2</h1>
<input id="u" placeholder="Username" value="admin">
<input id="p" type="password" placeholder="Password" value="Admin@2330">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
<div class="card">
<div class="tabs">
<div class="tab active" onclick="switchTab('upload')">Upload</div>
<div class="tab" onclick="switchTab('remote')">Remote URL</div>
<div class="tab" onclick="switchTab('browse')">Browse</div>
</div>

<div id="upload" class="tab-content active">
<h2>Upload Files (up to 10 at once)</h2>
<input type="file" id="files" multiple>
<input id="upId" placeholder="Identifier (optional)">
<button id="upBtn" onclick="uploadFiles()">Upload</button>
<div class="progress" id="prog"><div class="progress-bar" id="progBar"></div></div>
<div id="upOut" class="result"></div>
</div>

<div id="remote" class="tab-content">
<h2>Upload from URL</h2>
<input id="remoteUrl" placeholder="https://example.com/file.zip">
<div class="grid">
<input id="remoteId" placeholder="Identifier">
<input id="remoteName" placeholder="Filename (optional)">
</div>
<button onclick="uploadRemote()">Fetch & Upload</button>
<div id="remoteOut" class="result"></div>
</div>

<div id="browse" class="tab-content">
<h2>Your Archive Items</h2>
<button onclick="loadItems()" style="margin-bottom:12px">Refresh</button>
<div id="items" class="file-list"></div>
<div id="filesView" class="hidden">
<button class="small" onclick="backToItems()">← Back</button>
<h2 id="filesTitle" style="margin:12px 0"></h2>
<div id="filesList" class="file-list"></div>
</div>
</div>

</div>
</div>
</div>

<script>
let currentItem = null;

async function login(){
 const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u.value,pass:p.value})});
 if(r.ok){loginCard.classList.add('hidden');app.classList.remove('hidden');loadItems()}
 else alert('Invalid')
}

function switchTab(name){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
 event.target.classList.add('active');
 document.getElementById(name).classList.add('active');
}

async function uploadFiles(){
 const files = document.getElementById('files').files;
 if(!files.length) return alert('Select files');

 upBtn.disabled = true;
 prog.style.display = 'block';
 progBar.style.width = '0%';
 upOut.className = 'result'; upOut.classList.remove('show');

 const fd = new FormData();
 for(let f of files) fd.append('files', f);
 fd.append('identifier', upId.value);

 const xhr = new XMLHttpRequest();
 xhr.upload.onprogress = e => {
   if(e.lengthComputable) progBar.style.width = Math.round(e.loaded/e.total*100) + '%';
 };
 xhr.onload = () => {
   prog.style.display = 'none';
   upBtn.disabled = false;
   const data = JSON.parse(xhr.responseText);
   upOut.className = 'result ok show';
   upOut.innerHTML = data.results.map(r => `✅ ${r.file} → <a href="${r.url}" target="_blank">${r.id}</a>`).join('<br>');
   loadItems();
 };
 xhr.onerror = () => { prog.style.display='none'; upBtn.disabled=false; upOut.className='result err show'; upOut.innerHTML='Upload failed' };
 xhr.open('POST', '/api/upload');
 xhr.send(fd);
}

async function uploadRemote(){
 if(!remoteUrl.value) return alert('Enter URL');
 remoteOut.className='result'; remoteOut.classList.remove('show');
 const r = await fetch('/api/upload-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:remoteUrl.value,identifier:remoteId.value,filename:remoteName.value})});
 const j = await r.json();
 remoteOut.classList.add('show');
 if(r.ok){remoteOut.className='result ok show';remoteOut.innerHTML=`✅ ${j.filename} → <a href="${j.url}" target="_blank">${j.id}</a>`;loadItems()}
 else{remoteOut.className='result err show';remoteOut.innerHTML='❌ '+j.error}
}

async function loadItems(){
 items.innerHTML = 'Loading...';
 const r = await fetch('/api/items');
 const j = await r.json();
 items.innerHTML = j.items.map(it => `
   <div class="item" onclick="showFiles('${it.identifier}')">
     <div class="item-title">${it.identifier}</div>
     <div class="item-meta">${Math.round((it.item_size||0)/1024/1024)} MB • ${it.downloads||0} downloads</div>
   </div>
 `).join('') || 'No items yet';
}

async function showFiles(id){
 currentItem = id;
 items.parentElement.classList.add('hidden');
 filesView.classList.remove('hidden');
 filesTitle.textContent = id;
 filesList.innerHTML = 'Loading...';
 const r = await fetch(`/api/files/${id}`);
 const j = await r.json();
 filesList.innerHTML = j.files.map(f => `
   <div class="file">
     <span class="file-name">${f.name} (${Math.round(f.size/1024)} KB)</span>
     <a href="${f.url}" target="_blank"><button class="small">Open</button></a>
     <button class="small" onclick="delFile('${id}','${f.name.replace(/'/g,"\\'")}')">Del</button>
   </div>
 `).join('');
}

function backToItems(){
 filesView.classList.add('hidden');
 items.parentElement.classList.remove('hidden');
}

async function delFile(id,name){
 if(!confirm('Delete '+name+'?')) return;
 await fetch(`/api/files/${id}/${encodeURIComponent(name)}`,{method:'DELETE'});
 showFiles(id);
}
</script>
</body>
</html>
