<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive Drive v6.2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{--bg:#0b0f1a;--card:#1f2937;--border:#374151;--text:#f9fafb;--muted:#9ca3af;--primary:#6366f1;--green:#10b981;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
.hidden{display:none}#login{height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);padding:40px;border-radius:20px;width:350px}
input{width:100%;padding:12px;margin:8px 0;background:#111827;border:1px solid var(--border);border-radius:8px;color:var(--text)}
button{width:100%;padding:12px;background:var(--primary);border:0;border-radius:8px;color:#fff;cursor:pointer;margin-top:12px}
#app{display:flex;height:100vh}.sidebar{width:240px;background:#111827;border-right:1px solid var(--border);padding:20px}
.nav{padding:10px;margin:4px 0;border-radius:8px;cursor:pointer;color:var(--muted)}.nav.active{background:var(--primary);color:#fff}
.main{flex:1;padding:24px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer}
.card:hover{border-color:var(--primary)}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-gray{background:var(--muted)}
.progress{height:6px;background:#111827;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;background:var(--primary);transition:.3s}
</style></head><body>
<div id="login"><div class="login-card"><h2 style="text-align:center;margin-bottom:24px"><i class="fas fa-database"></i> Archive Drive v6.2</h2>
<input id="u" placeholder="Username"><input id="p" type="password" placeholder="Password"><button onclick="login()">Sign In</button></div></div>

<div id="app" class="hidden">
<div class="sidebar">
<div style="font-weight:600;margin-bottom:24px"><i class="fas fa-layer-group" style="color:var(--primary)"></i> v6.2</div>
<div class="nav active" onclick="page('drive',this)"><i class="fas fa-folder"></i> Drive</div>
<div class="nav" onclick="page('my',this)"><i class="fas fa-cloud"></i> My Uploads</div>
<div class="nav" onclick="page('upload',this)"><i class="fas fa-upload"></i> Upload</div>
<div class="nav" onclick="page('status',this)"><i class="fas fa-heart-pulse"></i> Status</div>
</div>
<div class="main">
<div id="p-drive"><div style="display:flex;gap:12px;margin-bottom:20px"><input id="q" placeholder="Identifier" style="flex:1"><button onclick="loadDrive()" style="width:auto;padding:0 20px">Open</button></div><div id="drive" class="grid"></div></div>
<div id="p-my" class="hidden"><div id="my" class="grid"></div></div>
<div id="p-upload" class="hidden"><input type="file" id="f" multiple onchange="up(this.files)"><button onclick="f.click()">Select Files</button><div id="list"></div></div>
<div id="p-status" class="hidden">
<h2 style="margin-bottom:20px">CDN Status Dashboard</h2>
<div class="status-grid" id="statusGrid"></div>
<div style="margin-top:24px;font-size:12px;color:var(--muted)">Auto-refresh every 5s • Dubai (DXB)</div>
</div>
</div></div>

<script>
let T=localStorage.getItem('t');if(T){login.style.display='none';app.classList.remove('hidden')}
const H=()=>({'Authorization':'Bearer '+T});
async function login(){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value})});const d=await r.json();if(d.token){T=d.token;localStorage.setItem('t',T);location.reload()}}
function page(n,el){document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));el.classList.add('active');document.querySelectorAll('[id^="p-"]').forEach(x=>x.classList.add('hidden'));document.getElementById('p-'+n).classList.remove('hidden');if(n==='status')loadStatus();if(n==='my')loadMy()}
async function loadDrive(){const id=q.value.trim();if(!id)return;const r=await fetch(`/api/files/${id}`,{headers:H()});const d=await r.json();drive.innerHTML=d.files.map(f=>`<div class="card" onclick="play('${f.streamUrl}','${f.type}','${f.name}')"><i class="fas fa-${f.type==='video'?'film':f.type==='audio'?'music':'file'}"></i> ${f.name}<div style="font-size:11px;color:var(--muted);margin-top:6px">${(f.size/1024/1024).toFixed(1)}MB</div><div style="margin-top:8px;display:flex;gap:8px"><button style="padding:4px 8px;font-size:11px;width:auto" onclick="event.stopPropagation();navigator.clipboard.writeText('${f.torrent}')"><i class="fas fa-magnet"></i> P2P</button></div></div>`).join('')}
function play(url,type,name){if(type==='video'||type==='audio'){const m=document.createElement('div');m.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center';m.innerHTML=`<div style="width:90%;max-width:1000px"><video id="player" controls autoplay src="${url}" style="width:100%"></video><button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:20px;right:20px;background:#fff;color:#000;border:0;padding:8px 12px;border-radius:6px">✕</button></div>`;document.body.appendChild(m);new Plyr('#player');}else window.open(url)}
async function loadMy(){const r=await fetch('/api/myitems',{headers:H()});const d=await r.json();my.innerHTML=d.items.map(i=>`<div class="card" onclick="q.value='${i.identifier}';page('drive',document.querySelector('.nav'));loadDrive()">${i.title||i.identifier}</div>`).join('')}
async function up(files){for(const f of files){const fd=new FormData();fd.append('file',f);await fetch('/api/upload',{method:'POST',headers:H(),body:fd})}}
async function loadStatus(){const r=await fetch('/api/status',{headers:H()});const s=await r.json();statusGrid.innerHTML=`
<div class="status-card"><div><span class="status-dot ${s.cloudflare.status==='active'?'dot-green':'dot-red'}"></span>Cloudflare Worker</div><div style="font-size:24px;margin:8px 0">${s.cloudflare.status==='active'?'Active':'Inactive'}</div><div class="progress"><div class="progress-bar" style="width:${s.cloudflare.usage||0}%"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px">${s.cloudflare.latency||0}ms • ${s.cloudflare.usage||0}% usage</div></div>
<div class="status-card"><div><span class="status-dot dot-green"></span>IPFS Gateways</div><div style="font-size:24px;margin:8px 0">${s.ipfs.gateways.filter(g=>g.status==='active').length} Active</div>${s.ipfs.gateways.map(g=>`<div style="font-size:11px">${g.url.split('//')[1]} • ${g.status}</div>`).join('')}</div>
<div class="status-card"><div><span class="status-dot ${s.oracle.configured?'dot-green':'dot-gray'}"></span>Oracle Cache</div><div style="font-size:24px;margin:8px 0">${s.oracle.configured?'Active':'Optional'}</div><div style="font-size:11px;color:var(--muted)">${s.oracle.configured?'Not configured':'Add ORACLE_ENDPOINT to enable'}</div></div>
<div class="status-card"><div><span class="status-dot dot-green"></span>Archive.org</div><div style="font-size:24px;margin:8px 0">2 Mirrors</div>${s.archive.mirrors.map(m=>`<div style="font-size:11px">${m.url.split('//')[1]} • ${m.latency}ms</div>`).join('')}</div>
<div class="status-card"><div><span class="status-dot dot-green"></span>WebTorrent</div><div style="font-size:24px;margin:8px 0">${s.webtorrent.peers} Peers</div><div style="font-size:11px;color:var(--muted)">P2P network active</div></div>
<div class="status-card"><div><span class="status-dot dot-green"></span>Dubai Latency</div><div style="font-size:24px;margin:8px 0">${s.dubai.latency}ms</div><div style="font-size:11px;color:var(--muted)">From DXB • Optimal</div></div>
`;}
setInterval(()=>{if(!document.getElementById('p-status').classList.contains('hidden'))loadStatus()},5000);
</script></body></html>
